# Deploy ResearchOne backend to Emma runtime VM over SSH (VM builds from git main).
# Runs in parallel with Vercel frontend deploys; not coupled to Vercel success.
#
# Required secrets: EMMA_HOST, EMMA_USER, EMMA_SSH_KEY
# Optional: EMMA_DEPLOY_PATH (default /opt/researchone), EMMA_KNOWN_HOSTS,
#           EMMA_WRITE_BACKEND_ENV (opt-in: multiline content written to backend/.env on VM),
#           EMMA_PUBLIC_HEALTH_URL (opt-in: full URL for public health, http or https)

name: Deploy backend to Emma

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'ecosystem.config.js'
      - 'scripts/**'
      - '.github/workflows/deploy-backend-emma.yml'
  workflow_dispatch:

concurrency:
  group: deploy-backend-emma
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start ssh-agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EMMA_SSH_KEY }}

      - name: Configure SSH known_hosts
        env:
          EMMA_HOST: ${{ secrets.EMMA_HOST }}
          EMMA_KNOWN_HOSTS: ${{ secrets.EMMA_KNOWN_HOSTS }}
        run: |
          set -e
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          if [ -n "${EMMA_KNOWN_HOSTS}" ]; then
            printf '%s\n' "${EMMA_KNOWN_HOSTS}" >> ~/.ssh/known_hosts
          else
            echo "::warning::EMMA_KNOWN_HOSTS not set; using ssh-keyscan (prefer pinning host keys in a secret)."
            ssh-keyscan -H "${EMMA_HOST}" >> ~/.ssh/known_hosts
          fi
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy over SSH
        env:
          EMMA_USER: ${{ secrets.EMMA_USER }}
          EMMA_HOST: ${{ secrets.EMMA_HOST }}
          EMMA_DEPLOY_PATH: ${{ secrets.EMMA_DEPLOY_PATH }}
          EMMA_WRITE_BACKEND_ENV: ${{ secrets.EMMA_WRITE_BACKEND_ENV }}
        run: |
          set -euo pipefail
          DEPLOY_PATH="${EMMA_DEPLOY_PATH:-/opt/researchone}"
          REMOTE="${EMMA_USER}@${EMMA_HOST}"

          if [ -n "${EMMA_WRITE_BACKEND_ENV:-}" ]; then
            TMP="$(mktemp)"
            chmod 600 "${TMP}"
            printf '%s' "${EMMA_WRITE_BACKEND_ENV}" > "${TMP}"
            ssh -o StrictHostKeyChecking=yes "${REMOTE}" \
              "mkdir -p '${DEPLOY_PATH}/backend' && cat > '${DEPLOY_PATH}/backend/.env' && chmod 600 '${DEPLOY_PATH}/backend/.env'" < "${TMP}"
            rm -f "${TMP}"
          fi

          ssh -o StrictHostKeyChecking=yes "${REMOTE}" \
            "cd '${DEPLOY_PATH}' && export DEPLOY_SOURCE=github-actions RESEARCHONE_DEPLOY_PATH='${DEPLOY_PATH}' && bash ./scripts/deploy-runtime.sh"

      - name: Optional public health check
        if: ${{ secrets.EMMA_PUBLIC_HEALTH_URL != '' }}
        env:
          EMMA_PUBLIC_HEALTH_URL: ${{ secrets.EMMA_PUBLIC_HEALTH_URL }}
        run: |
          set -euo pipefail
          curl -sS --fail --max-time 30 "${EMMA_PUBLIC_HEALTH_URL}"
