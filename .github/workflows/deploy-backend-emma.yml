# Build backend in GitHub Actions and deploy to Emma runtime VM over SSH.
# Runs on the same push to main that triggers Vercel (parallel, not chained to Vercel).
#
# Required repository secrets: EMMA_HOST, EMMA_USER, EMMA_SSH_KEY
# Optional: EMMA_DEPLOY_PATH (default /opt/researchone), EMMA_KNOWN_HOSTS (recommended)

name: Deploy backend to Emma

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'ecosystem.config.js'
      - '.github/workflows/deploy-backend-emma.yml'
  workflow_dispatch:

concurrency:
  group: deploy-backend-emma
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Build backend
        run: |
          cd backend
          npm ci
          npm run build

      - name: Start ssh-agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EMMA_SSH_KEY }}

      - name: Configure SSH known_hosts
        env:
          EMMA_HOST: ${{ secrets.EMMA_HOST }}
          EMMA_KNOWN_HOSTS: ${{ secrets.EMMA_KNOWN_HOSTS }}
        run: |
          set -e
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          if [ -n "${EMMA_KNOWN_HOSTS}" ]; then
            printf '%s\n' "${EMMA_KNOWN_HOSTS}" >> ~/.ssh/known_hosts
          else
            echo "::warning::EMMA_KNOWN_HOSTS not set; using ssh-keyscan (prefer pinning host keys in a secret)."
            ssh-keyscan -H "${EMMA_HOST}" >> ~/.ssh/known_hosts
          fi
          chmod 644 ~/.ssh/known_hosts

      - name: Rsync dist and lockfiles to Emma
        env:
          EMMA_USER: ${{ secrets.EMMA_USER }}
          EMMA_HOST: ${{ secrets.EMMA_HOST }}
          EMMA_DEPLOY_PATH: ${{ secrets.EMMA_DEPLOY_PATH }}
        run: |
          set -euo pipefail
          DEPLOY_PATH="${EMMA_DEPLOY_PATH:-/opt/researchone}"
          TARGET="${EMMA_USER}@${EMMA_HOST}:${DEPLOY_PATH}/backend/"
          rsync -avz -e "ssh -o StrictHostKeyChecking=yes" \
            --delete \
            backend/dist/ "${TARGET}dist/"
          rsync -avz -e "ssh -o StrictHostKeyChecking=yes" \
            backend/package.json \
            backend/package-lock.json \
            "${TARGET}"

      - name: Install production dependencies and restart PM2
        env:
          EMMA_USER: ${{ secrets.EMMA_USER }}
          EMMA_HOST: ${{ secrets.EMMA_HOST }}
          EMMA_DEPLOY_PATH: ${{ secrets.EMMA_DEPLOY_PATH }}
        run: |
          set -euo pipefail
          DEPLOY_PATH="${EMMA_DEPLOY_PATH:-/opt/researchone}"
          ssh -o StrictHostKeyChecking=yes "${EMMA_USER}@${EMMA_HOST}" \
            "cd '${DEPLOY_PATH}/backend' && npm ci --omit=dev && cd '${DEPLOY_PATH}' && pm2 restart researchone-api --update-env"
